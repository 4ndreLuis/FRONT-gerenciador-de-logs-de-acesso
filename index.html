<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureVault | Access Control</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>SecureVault 🔒</h1>
        <p>Monitoramento de Acesso em Tempo Real</p>
      </header>

      <section class="panel">
        <div class="input-box">
          <input
            type="text"
            id="inputUser"
            placeholder="ID do Usuário ou Nome"
          />
          <button id="btnGrant">Conceder Acesso</button>
        </div>

        <div class="stats">
          <div class="stat-card">
            <span>Total de Acessos</span>
            <strong id="totalCount">0</strong>
          </div>
          <div class="stat-card">
            <span>Status do Sistema</span>
            <strong id="systemStatus" class="status-online">ONLINE</strong>
          </div>
        </div>
      </section>

      <section class="log-section">
        <h2>Logs de Atividade</h2>
        <ul id="logList"></ul>
      </section>
    </div>
  </body>
</html>
